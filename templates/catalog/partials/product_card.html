<div class="card product-card border-0 shadow-sm h-100 overflow-hidden d-flex flex-column">
    <a href="{{ product.get_absolute_url }}" class="text-decoration-none text-slate-800 d-block">
        <div class="card-top product-media position-relative">
            <div class="product-image-shell">
                <img src="{{ product.primary_image_url }}" class="product-image product-image-fill" alt="{{ product.name }}" loading="lazy" decoding="async">
            </div>
        </div>
        <div class="card-body product-copy pt-3">
            <h3 class="h6 product-title mb-2">{{ product.name }}</h3>
            <div class="price-row">
                <span class="product-price">&#2547;{{ product.price }}</span>
                {% if product.compare_at_price %}<small class="product-compare">&#2547;{{ product.compare_at_price }}</small>{% endif %}
            </div>
        </div>
    </a>
    <div class="product-actions mt-auto">
        <form method="post" action="{% url 'catalog:add_to_cart' product.slug %}" class="js-add-to-cart-ajax">
            {% csrf_token %}
            <input type="hidden" name="quantity" value="1">
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <button type="submit" class="btn btn-outline-primary btn-sm w-100 product-action-btn" {% if not product.in_stock %}disabled{% endif %}>
                {% if product.in_stock %}Add to Cart{% else %}Out of Stock{% endif %}
            </button>
        </form>
    </div>
</div>

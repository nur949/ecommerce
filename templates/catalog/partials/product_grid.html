{% if products %}
<section class="shop-category-section">
  <div class="row g-4" id="shopProductsGrid">
    {% for product in products %}
    <div class="col-6 col-md-4 col-xl-3">{% include 'catalog/partials/product_card.html' with product=product %}</div>
    {% endfor %}
  </div>
</section>
{% if page_obj.has_next %}
<div class="mt-8 text-center">
  <button type="button" class="js-load-more-products rounded-full border border-black/10 bg-white px-6 py-3 text-sm font-semibold text-ink" data-next-page="{{ page_obj.next_page_number }}">Load more</button>
</div>
{% endif %}
{% else %}
<div class="rounded-[24px] border border-black/5 bg-white px-6 py-16 text-center shadow-soft">
  <h2 class="text-2xl font-semibold text-ink">No products found</h2>
  <p class="mt-3 text-sm text-stone">Try a different filter or keyword.</p>
</div>
{% endif %}

{% for product in products %}
    <div class="col-md-6 col-lg-4 col-xl-3 my-4">{% include 'catalog/partials/product_card.html' with product=product %}</div>
{% empty %}
    <div class="col-12">
        <div class="aura-card text-center p-5">
            <h2 class="h5 mb-2">No products found</h2>
            <p class="aura-muted mb-0">Try another category, search term, or sort option.</p>
        </div>
    </div>
{% endfor %}

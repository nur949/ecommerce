{% for product in products %}
    <div class="col-6 col-sm-4 col-lg-3 col-xxl-2">{% include 'catalog/partials/product_card.html' with product=product %}</div>
{% empty %}
    <div class="col-12">
        <div class="rounded-[32px] border border-black/5 bg-white px-6 py-16 text-center shadow-soft">
            <h2 class="text-2xl font-semibold text-ink">No products found</h2>
            <p class="mt-3 text-sm text-stone">Try another category, search term, or sort option.</p>
        </div>
    </div>
{% endfor %}

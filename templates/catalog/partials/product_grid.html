{% if products %}
  <section class="shop-category-section">
    <div id="shopProductsGrid" class="grid gap-4 grid-cols-2 xl:grid-cols-4">
      {% for product in products %}
        <div class="col-xl-3">
          {% include 'catalog/partials/product_card.html' with product=product %}
        </div>
      {% endfor %}
    </div>
  </section>
  {% if page_obj.has_next %}
    <div class="mt-8 text-center">
      <button type="button" class="js-load-more-products rounded-xl2 border border-line bg-white px-6 py-3 text-sm font-bold shadow-card transition duration-300 hover:border-primary hover:text-primary" data-next-page="{{ page_obj.next_page_number }}">Load more products</button>
    </div>
  {% endif %}
{% else %}
  <div class="rounded-2xl border border-dashed border-line bg-white px-6 py-16 text-center shadow-card">
    <h2 class="font-display text-2xl font-bold">No products found</h2>
    <p class="mt-2 text-sm text-muted">Adjust your category, brand, or price range and try again.</p>
  </div>
{% endif %}

<a href="{% url 'catalog:shop' %}" data-category="all" class="block rounded-full px-4 py-2 text-sm {% if not selected_category %}bg-[#e2e8f0] text-ink{% else %}text-stone{% endif %}">All Products</a>
{% for category in categories %}
<a href="{% url 'catalog:shop' %}?category={{ category.slug }}" data-category="{{ category.slug }}" class="block rounded-full px-4 py-2 text-sm {% if selected_category and selected_category.id == category.id %}bg-[#e2e8f0] text-ink{% else %}text-stone{% endif %}">
  {{ category.name }}
</a>
{% endfor %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Server Error | Zynvo</title>
  <style>
    :root { color-scheme: light; --ink: #191417; --accent: #7a1f3d; --muted: #6f6a72; --bg: #f6f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Inter, Arial, sans-serif; background: linear-gradient(135deg, #f8fafc, var(--bg)); color: var(--ink); }
    main { width: min(760px, 100%); border: 1px solid rgba(25, 20, 23, .1); border-radius: 8px; background: #fff; padding: clamp(32px, 8vw, 72px); text-align: center; box-shadow: 0 28px 70px rgba(25, 20, 23, .14); }
    p:first-child { color: #0f766e; font-size: 12px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
    h1 { margin: 16px 0; font-size: clamp(40px, 9vw, 84px); line-height: .95; letter-spacing: .08em; text-transform: uppercase; }
    p { color: var(--muted); line-height: 1.7; }
    a { display: inline-flex; min-height: 44px; align-items: center; justify-content: center; margin-top: 24px; border-radius: 8px; background: var(--accent); color: #fff; padding: 12px 20px; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <p>500</p>
    <h1>Something Went Wrong</h1>
    <p>The storefront hit an unexpected issue. Try again shortly or return to the shop.</p>
    <a href="/">Go Home</a>
  </main>
</body>
</html>

{% extends 'base.html' %}
{% block meta_robots %}<meta name="robots" content="noindex,nofollow">{% endblock %}
{% block title %}Password Updated | Zynvo{% endblock %}
{% block content %}
<section class="px-4 py-6 lg:px-8">
  <div class="mx-auto max-w-xl">
    <div class="aura-card p-8 text-center">
      <p class="premium-kicker">Password updated</p>
      <h1 class="mt-3 font-brand text-5xl font-semibold uppercase tracking-[0.12em] text-ink">Access Restored</h1>
      <p class="mt-4 text-sm leading-7 text-stone">Your password has been updated successfully.</p>
      <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-6">Return to Login</a>
    </div>
  </div>
</section>
{% endblock %}

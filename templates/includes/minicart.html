<div class="mini-cart-backdrop d-none" id="miniCartBackdrop"></div>
<aside class="mini-cart-drawer d-none" id="miniCartPanel" aria-hidden="true">
    <div class="mini-cart-card bg-white rounded-4 p-4 shadow-sm border">
        <div class="mini-cart-head">
            <h6 class="m-0 fw-bold">Cart Summary</h6>
            <button type="button" class="mini-cart-close" id="miniCartClose" aria-label="Close cart panel">×</button>
        </div>
        {% if cart_count %}
            <div class="d-flex justify-content-between align-items-center mb-3 mt-3">
                <a href="{% url 'orders:cart' %}" class="text-primary text-decoration-none">View Cart</a>
            </div>
            {% for item in cart_items|slice:':3' %}
                <div class="d-flex align-items-center gap-3 mb-3">
                    <img src="{{ item.product.primary_image_url }}" alt="{{ item.product.name }}" class="mini-thumb">
                    <div class="flex-grow-1">
                        <div class="fw-semibold small">{{ item.product.name }}</div>
                        <div class="text-muted small">{{ item.quantity }} × ৳{{ item.unit_price }}</div>
                    </div>
                </div>
            {% endfor %}
            <div class="d-flex justify-content-between fw-semibold border-top pt-3">
                <span>Subtotal</span>
                <span>৳{{ cart_subtotal }}</span>
            </div>
            <div class="d-grid gap-2 mt-3">
                <a href="{% url 'orders:cart' %}" class="btn btn-outline-primary rounded-pill">View Cart</a>
                <a href="{% url 'orders:checkout' %}" class="btn btn-primary rounded-pill">Checkout</a>
            </div>
        {% else %}
            <div class="text-center py-3">
                <div class="text-5xl mb-2">🛒</div>
                <h5 class="fw-bold mb-1">EMPTY <span class="text-primary">CART</span>!</h5>
                <p class="text-muted mb-3">Please add product to view.</p>
                <a href="{% url 'catalog:shop' %}" class="btn btn-primary rounded-pill px-4">Go to Shop</a>
            </div>
        {% endif %}
    </div>
</aside>

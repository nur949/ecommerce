<section id="deals" class="padding-medium bg-light">
  <div class="container">
    <div class="section-header d-md-flex justify-content-between align-items-center mb-3">
      <h2 class="display-5 fw-light text-uppercase">Daily Deals</h2>
      <a href="{% url 'catalog:shop' %}?sale=1" class="btn btn-primary">See More</a>
    </div>
    <div class="row">
      {% for product in daily_deals %}
      <div class="col-md-6 col-lg-3 my-4">{% include 'catalog/partials/product_card.html' with product=product show_stock=True %}</div>
      {% empty %}
      <p class="aura-muted">No deals available yet.</p>
      {% endfor %}
    </div>
  </div>
</section>

<section id="deals" class="bg-white px-4 py-16 lg:px-8">
  <div class="mx-auto max-w-7xl">
    <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <p class="text-[11px] font-semibold uppercase tracking-[0.32em] text-stone">Limited-time savings</p>
        <h2 class="mt-3 font-brand text-4xl font-semibold uppercase tracking-[0.16em] text-ink md:text-5xl">Daily Deals</h2>
      </div>
      <a href="{% url 'catalog:shop' %}?sale=1" class="inline-flex items-center justify-center rounded-full bg-ink px-5 py-3 text-sm font-semibold text-white transition hover:bg-rosewood">See More</a>
    </div>
    <div class="row g-4">
      {% for product in daily_deals %}
      <div class="col-md-6 col-xl-3">{% include 'catalog/partials/product_card.html' with product=product show_stock=True %}</div>
      {% empty %}
      <p class="text-sm text-stone">No deals available yet.</p>
      {% endfor %}
    </div>
  </div>
</section>

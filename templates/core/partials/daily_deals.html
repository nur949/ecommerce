<section class="container py-4">
  <div class="deal-shell rounded-5 p-4">
    <div class="section-header deals-header"><h2>Daily Deals</h2><a href="{% url 'catalog:shop' %}">See More</a></div>
    <div class="row g-3">
      {% for product in daily_deals %}
      <div class="col-6 col-md-4 col-lg-3">{% include 'catalog/partials/product_card.html' with product=product show_stock=True %}</div>
      {% empty %}
      <p class="text-muted">No deals available yet.</p>
      {% endfor %}
    </div>
  </div>
</section>

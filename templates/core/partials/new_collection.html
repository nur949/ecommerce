<section id="new-collection" class="padding-medium">
  <div class="container">
  <div class="section-header d-md-flex justify-content-between align-items-center mb-3">
    <h2 class="display-5 fw-light text-uppercase">New Collection</h2>
    <a href="{% url 'catalog:shop' %}" class="btn btn-primary">See More</a>
  </div>
  <div class="row">
    {% for product in new_collection %}
    <div class="col-md-6 col-lg-3 my-4">{% include 'catalog/partials/product_card.html' with product=product %}</div>
    {% endfor %}
  </div>
  </div>
</section>

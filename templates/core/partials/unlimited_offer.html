{% load static %}
<section id="offers" class="padding-medium">
  <div class="container">
    <div class="section-header d-md-flex justify-content-between align-items-center mb-3">
      <h2 class="display-5 fw-light text-uppercase">Unlimited Offer</h2>
    </div>
    <div class="row">
      {% for banner in unlimited_banners %}
      <div class="col-md-6 col-lg-3 my-4">
        <a href="{{ banner.url }}" class="product-item d-block">
          <div class="image-holder">
            {% if banner.image %}
            <img src="{{ banner.image.url }}" alt="{{ banner.title }}" class="product-image img-fluid">
            {% else %}
            <img src="{% static 'aura/images/product-item' %}{{ forloop.counter }}.jpg" alt="{{ banner.title }}" class="product-image img-fluid">
            {% endif %}
          </div>
          <div class="product-detail mt-2">
            <h5 class="product-title mb-1">{{ banner.title }}</h5>
            {% if banner.subtitle %}<p class="aura-muted mb-0">{{ banner.subtitle }}</p>{% endif %}
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

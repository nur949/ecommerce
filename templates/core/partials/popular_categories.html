<section class="container py-4">
  <div class="section-header"><h2>Popular Categories</h2></div>
  <div class="row g-3">
    {% for item in popular_categories_data %}
    <div class="col-xl-2 col-lg-3 col-md-4 col-6">
      <a href="{{ item.category.get_absolute_url }}" class="text-decoration-none text-slate-800 category-grid-card d-block h-100">
        <div class="category-grid-media">
          <img src="{{ item.image_url }}" alt="{{ item.category.name }}" class="category-grid-image">
        </div>
        <div class="category-grid-name">{{ item.category.name }}</div>
      </a>
    </div>
    {% endfor %}
  </div>
</section>

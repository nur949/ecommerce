<section id="categories" class="top-categories-section">
  <div class="top-categories-inner">
    <div class="top-categories-header">
      <h2>Top Categories</h2>
      <a href="{% url 'catalog:shop' %}" class="top-categories-see-all">See All <span aria-hidden="true">-></span></a>
    </div>

    {% if popular_categories_data %}
    <div class="top-categories-list" aria-label="Top categories">
      {% for item in popular_categories_data|slice:":6" %}
      <a href="{{ item.category.get_absolute_url }}" class="top-category-item">
        <span class="top-category-image-ring">
          <img src="{{ item.image_url }}" alt="{{ item.category.name }}" loading="lazy" decoding="async">
        </span>
        <span class="top-category-name">{{ item.category.name }}</span>
      </a>
      {% endfor %}
    </div>
    {% else %}
    <div class="top-categories-empty">
      <h3>Categories coming soon</h3>
      <p>Feature your main departments to help shoppers reach products faster.</p>
    </div>
    {% endif %}
  </div>
</section>

{% extends 'base.html' %}
{% block title %}Blog | Zynvo{% endblock %}
{% block content %}
<section class="px-4 py-6 lg:px-8">
  <div class="mx-auto max-w-7xl rounded-[36px] bg-[#1b141a] px-6 py-14 text-white shadow-panel md:px-10">
    <p class="text-[11px] font-semibold uppercase tracking-[0.34em] text-white/55">Editorial</p>
    <h1 class="mt-4 font-brand text-5xl font-semibold uppercase tracking-[0.12em] md:text-7xl">Beauty Journal</h1>
  </div>
</section>
<section class="px-4 pb-16 pt-8 lg:px-8">
  <div class="mx-auto max-w-7xl">
    <div class="row g-4">
      {% for post in posts %}
      <div class="col-lg-4">
        <article class="premium-grid-card overflow-hidden">
          <a href="{{ post.get_absolute_url }}" class="block">
            <img src="{{ post.primary_image_url }}" alt="{{ post.title }}" class="blog-card-image" loading="lazy" decoding="async">
          </a>
          <div class="p-5">
            <h2 class="text-2xl font-semibold text-ink"><a href="{{ post.get_absolute_url }}" class="transition hover:text-rosewood">{{ post.title }}</a></h2>
            <p class="mt-3 text-sm leading-7 text-stone">{{ post.excerpt }}</p>
          </div>
        </article>
      </div>
      {% endfor %}
      {% for post in demo_posts %}
      <div class="col-lg-4">
        <article class="premium-grid-card overflow-hidden">
          <a href="{{ post.get_absolute_url }}" class="block">
            <img src="{{ post.primary_image_url }}" alt="{{ post.title }}" class="blog-card-image" loading="lazy" decoding="async">
          </a>
          <div class="p-5">
            <h2 class="text-2xl font-semibold text-ink"><a href="{{ post.get_absolute_url }}" class="transition hover:text-rosewood">{{ post.title }}</a></h2>
            <p class="mt-3 text-sm leading-7 text-stone">{{ post.excerpt }}</p>
          </div>
        </article>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Blog | Zynvo{% endblock %}
{% block content %}
<section class="container py-5 page-shell">
    <div class="section-header"><h1 class="h2 fw-bold">Latest from Zynvo</h1></div>
    <div class="row g-4">
        {% for post in posts %}
        <div class="col-lg-4">
            <article class="bg-white rounded-5 p-3 shadow-sm h-100 theme-panel">
                <a href="{{ post.get_absolute_url }}" class="text-decoration-none d-block mb-3">
                    <img src="{{ post.primary_image_url }}" alt="{{ post.title }}" class="w-100 rounded-4 blog-card-image">
                </a>
                <h2 class="h4 mb-2"><a href="{{ post.get_absolute_url }}" class="text-decoration-none">{{ post.title }}</a></h2>
                <p class="text-muted mb-0">{{ post.excerpt }}</p>
            </article>
        </div>
        {% endfor %}
        {% for post in demo_posts %}
        <div class="col-lg-4">
            <article class="bg-white rounded-5 p-3 shadow-sm h-100 theme-panel">
                <a href="{{ post.get_absolute_url }}" class="text-decoration-none d-block mb-3">
                    <img src="{{ post.primary_image_url }}" alt="{{ post.title }}" class="w-100 rounded-4 blog-card-image">
                </a>
                <h2 class="h4 mb-2"><a href="{{ post.get_absolute_url }}" class="text-decoration-none">{{ post.title }}</a></h2>
                <p class="text-muted mb-0">{{ post.excerpt }}</p>
            </article>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}

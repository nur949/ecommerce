{% extends 'base.html' %}
{% block title %}Outlets | Zynvo{% endblock %}
{% block content %}
<section class="px-4 py-6 lg:px-8">
  <div class="mx-auto max-w-7xl rounded-[36px] bg-[#1b141a] px-6 py-14 text-white shadow-panel md:px-10">
    <p class="text-[11px] font-semibold uppercase tracking-[0.34em] text-white/55">Store locations</p>
    <h1 class="mt-4 font-brand text-5xl font-semibold uppercase tracking-[0.12em] md:text-7xl">Our Outlets</h1>
  </div>
</section>
<section class="px-4 pb-16 pt-8 lg:px-8">
  <div class="mx-auto max-w-4xl">
    <div class="aura-card p-6 md:p-8">
      <p class="text-base leading-8 text-stone">Visit Zynvo in Dhaka, Chattogram, and Sylhet. Contact support for updated outlet schedules.</p>
      <div class="mt-6 grid gap-3 sm:grid-cols-3">
        <div class="rounded-md border border-black/5 bg-[#f1f5f3] p-4 font-semibold text-ink">Dhaka</div>
        <div class="rounded-md border border-black/5 bg-[#f1f5f3] p-4 font-semibold text-ink">Chattogram</div>
        <div class="rounded-md border border-black/5 bg-[#f1f5f3] p-4 font-semibold text-ink">Sylhet</div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

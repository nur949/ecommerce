{% extends 'base.html' %}
{% block title %}{{ page.meta_title|default:page.title }}{% endblock %}
{% block meta_description %}{{ page.meta_description }}{% endblock %}
{% block content %}
<section class="page-hero"><div class="container"><h1 class="display-2 text-uppercase">{{ page.title }}</h1></div></section>
<section class="padding-medium pt-5">
  <div class="container">
    <div class="aura-card p-5">{{ page.body|linebreaks }}</div>
  </div>
</section>
{% endblock %}

{% load static %}
<aside class="rounded-[8px] border border-black/5 bg-white p-5 shadow-soft">
  <div class="flex items-center gap-4">
    {% if profile.profile_picture %}
    <img src="{{ profile.profile_picture.url }}" alt="{{ request.user.get_full_name|default:request.user.email }}" class="h-16 w-16 rounded-[8px] object-cover">
    {% else %}
    <img src="{% static 'img/default-avatar.svg' %}" alt="" class="h-16 w-16 rounded-[8px] object-cover">
    {% endif %}
    <div class="min-w-0">
      <p class="truncate text-lg font-semibold text-ink">{{ request.user.get_full_name|default:request.user.username }}</p>
      <p class="truncate text-sm text-stone">{{ request.user.email }}</p>
    </div>
  </div>
  <nav class="mt-6 grid gap-2 text-sm font-semibold" aria-label="Profile navigation">
    <a href="{% url 'profiles:profile' %}" class="rounded-[8px] px-3 py-2 text-ink transition hover:bg-[#f1f5f9] hover:text-rosewood">Profile overview</a>
    <a href="{% url 'profiles:profile_edit' %}" class="rounded-[8px] px-3 py-2 text-ink transition hover:bg-[#f1f5f9] hover:text-rosewood">Edit profile</a>
    <a href="{% url 'accounts:dashboard' %}" class="rounded-[8px] px-3 py-2 text-ink transition hover:bg-[#f1f5f9] hover:text-rosewood">Account dashboard</a>
    <a href="{% url 'accounts:wishlist' %}" class="rounded-[8px] px-3 py-2 text-ink transition hover:bg-[#f1f5f9] hover:text-rosewood">Wishlist</a>
    <form method="post" action="{% url 'accounts:logout' %}">
      {% csrf_token %}
      <button class="w-full rounded-[8px] px-3 py-2 text-left text-ink transition hover:bg-[#f1f5f9] hover:text-rosewood">Logout</button>
    </form>
  </nav>
</aside>
